<svg xmlns='http://www.w3.org/2000/svg' width='1000' height='420' viewBox='0 0 1000 420'><rect width='1000' height='420' rx='10' fill='#ffffff'/><defs><marker id='arr-57606a' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#57606a'/></marker><marker id='arr-326ce5' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#326ce5'/></marker><marker id='arr-1a7f37' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#1a7f37'/></marker><marker id='arr-8250df' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#8250df'/></marker><marker id='arr-bc4c00' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#bc4c00'/></marker><marker id='arr-0d7d7d' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#0d7d7d'/></marker><marker id='arr-1a4fb4' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#1a4fb4'/></marker><marker id='arr-cf222e' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='7' markerHeight='7' orient='auto-start-reverse'><path d='M0 0 L10 5 L0 10 z' fill='#cf222e'/></marker></defs><text x='500.0' y='32' font-size='20' fill='#1f2328' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>ConfigMap &amp; Secret : séparer la config du conteneur</text><text x='500.0' y='56' font-size='12' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>La même image nginx, configurée différemment selon l'environnement</text><rect x='70' y='100' width='300' height='110' rx='12' fill='#d7f5f5' stroke='#0d7d7d' stroke-width='2' /><text x='220' y='126' font-size='13' fill='#0d7d7d' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>ConfigMap : nginx-conf</text><text x='85' y='152' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>default.conf: |</text><text x='85' y='172' font-size='10.5' fill='#57606a' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>  server { listen 80; ... }</text><text x='85' y='192' font-size='10.5' fill='#57606a' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>index.html, variables...</text><rect x='70' y='240' width='300' height='110' rx='12' fill='#fff1e5' stroke='#bc4c00' stroke-width='2' /><text x='220' y='266' font-size='13' fill='#bc4c00' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Secret : nginx-tls</text><text x='85' y='292' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>tls.crt: •••••• (base64)</text><text x='85' y='312' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>tls.key: •••••• (base64)</text><text x='85' y='332' font-size='10' fill='#57606a' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>chiffré au repos dans etcd</text><line x1='370' y1='175' x2='600' y2='200' stroke='#0d7d7d' stroke-width='3' marker-end='url(#arr-0d7d7d)' /><line x1='370' y1='295' x2='600' y2='245' stroke='#bc4c00' stroke-width='3' marker-end='url(#arr-bc4c00)' /><text x='490' y='150' font-size='10.5' fill='#57606a' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>monté en volume</text><text x='490' y='330' font-size='10.5' fill='#57606a' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>ou injecté en variable</text><rect x='600' y='150' width='320' height='140' rx='14' fill='#ffffff' stroke='#326ce5' stroke-width='2.5' /><text x='616' y='176' font-size='14' fill='#1a4fb4' font-weight='bold' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>Pod nginx</text><rect x='630' y='190' width='260' height='80' rx='10' fill='#dafbe1' stroke='#1a7f37' stroke-width='2' /><text x='760' y='222' font-size='15' fill='#1f2328' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>nginx:1.27</text><text x='760' y='248' font-size='10' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>/etc/nginx/conf.d/</text><text x='500.0' y='400' font-size='11' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>On change la config sans rebuilder l'image : il suffit de modifier le ConfigMap et de redémarrer les Pods.</text></svg>