<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Formation — DevOps · Docker · Spring · Scrum</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --primary: #6366f1;
    --primary-d: #4f46e5;
    --green: #22c55e;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
    width: 100%;
    max-width: 640px;
    padding: 32px;
    border: 1px solid var(--border);
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header p { color: var(--muted); font-size: .9rem; }
  .progress-wrap {
    background: var(--border);
    border-radius: 10px;
    height: 8px;
    overflow: hidden;
    margin: 20px 0;
  }
  .progress-bar {
    background: linear-gradient(90deg, var(--primary), #a855f7);
    height: 100%;
    width: 0;
    transition: width .4s ease;
  }
  .meta {
    display: flex;
    justify-content: space-between;
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .tag {
    display: inline-block;
    background: var(--primary-d);
    color: #fff;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: .72rem;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .question {
    font-size: 1.15rem;
    font-weight: 600;
    margin: 16px 0 20px;
    line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all .2s;
    font-size: .95rem;
    text-align: left;
    color: var(--text);
  }
  .option:hover:not(.disabled) { border-color: var(--primary); transform: translateY(-2px); }
  .option.correct { border-color: var(--green); background: rgba(34,197,94,.15); }
  .option.wrong { border-color: var(--red); background: rgba(239,68,68,.15); }
  .option.disabled { cursor: default; opacity: .85; }
  .feedback {
    margin-top: 18px;
    padding: 14px;
    border-radius: 12px;
    font-size: .9rem;
    display: none;
    line-height: 1.5;
  }
  .feedback.show { display: block; }
  .feedback.ok { background: rgba(34,197,94,.12); border-left: 4px solid var(--green); }
  .feedback.ko { background: rgba(239,68,68,.12); border-left: 4px solid var(--red); }
  .actions { margin-top: 24px; display: flex; justify-content: flex-end; }
  button.next {
    background: var(--primary);
    color: #fff;
    border: none;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .2s;
  }
  button.next:hover { background: var(--primary-d); }
  button.next:disabled { opacity: .4; cursor: not-allowed; }
  .result { text-align: center; }
  .result h2 { font-size: 2rem; margin-bottom: 10px; }
  .score-circle {
    font-size: 3rem;
    font-weight: 700;
    margin: 20px 0;
    color: var(--primary);
  }
  .result p { color: var(--muted); margin-bottom: 24px; }

  /* ===== Interface de révision pro ===== */
  .container { max-width: 720px; }
  header { margin-bottom: 20px; }
  .brand { display:flex; align-items:center; gap:14px; text-align:left; }
  .brand .logo { font-size:2.2rem; line-height:1; }
  .brand h1 { font-size:1.35rem; }
  .brand p { color:var(--muted); font-size:.82rem; margin-top:2px; }
  .screen[hidden] { display:none; }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
  .stat { background:var(--bg); border:1px solid var(--border); border-radius:14px; padding:16px; text-align:center; }
  .stat-num { display:block; font-size:1.7rem; font-weight:700; color:var(--primary); }
  .stat-lbl { font-size:.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

  .field { margin-bottom:18px; }
  .field > label { display:block; font-size:.78rem; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
  select { width:100%; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:12px; padding:12px 14px; font-size:.95rem; cursor:pointer; }
  select:focus { outline:none; border-color:var(--primary); }

  .seg { display:flex; flex-wrap:wrap; gap:8px; }
  .seg button { flex:1; min-width:90px; background:var(--bg); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:10px 12px; font-size:.85rem; cursor:pointer; transition:.15s; }
  .seg button:hover { border-color:var(--primary); }
  .seg button.active { background:var(--primary); border-color:var(--primary); color:#fff; font-weight:600; }

  .btn { border:none; border-radius:12px; padding:12px 22px; font-size:.95rem; font-weight:600; cursor:pointer; transition:.18s; }
  .btn-primary { background:var(--primary); color:#fff; }
  .btn-primary:hover { background:var(--primary-d); }
  .btn-primary:disabled { opacity:.4; cursor:not-allowed; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { color:var(--text); border-color:var(--primary); }
  .btn-ghost.active { color:#f59e0b; border-color:#f59e0b; }
  .btn-block { width:100%; margin-top:6px; }
  .hint { text-align:center; color:var(--muted); font-size:.78rem; margin-top:14px; }

  .topbar { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .topbar .counter { color:var(--muted); font-size:.85rem; }
  .score-pill { margin-left:auto; background:rgba(34,197,94,.15); color:var(--green); border:1px solid rgba(34,197,94,.4); padding:4px 12px; border-radius:20px; font-size:.8rem; font-weight:600; }

  .option { display:flex; align-items:center; gap:14px; width:100%; }
  .option .ltr { flex:0 0 28px; height:28px; display:flex; align-items:center; justify-content:center; background:var(--card); border:1px solid var(--border); border-radius:8px; font-size:.8rem; font-weight:700; color:var(--muted); }
  .option.correct .ltr { background:var(--green); color:#fff; border-color:var(--green); }
  .option.wrong .ltr { background:var(--red); color:#fff; border-color:var(--red); }
  .option.selected { border-color:var(--primary); background:rgba(99,102,241,.12); }
  .option.selected .ltr { background:var(--primary); color:#fff; border-color:var(--primary); }

  .navbar { margin-top:22px; display:flex; justify-content:space-between; gap:12px; }
  .navbar-center { justify-content:center; }

  .result-head { text-align:center; margin-bottom:10px; }
  .ring { --pct:0; --ring-color:var(--primary); width:140px; height:140px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; background:conic-gradient(var(--ring-color) calc(var(--pct)*1%), var(--border) 0); }
  .ring-pct { width:108px; height:108px; border-radius:50%; background:var(--card); display:flex; align-items:center; justify-content:center; font-size:1.9rem; font-weight:700; }
  .result-head h2 { font-size:1.4rem; margin-bottom:6px; }
  .result-head .result-sub { color:var(--muted); font-size:.85rem; margin-top:4px; }

  .section-title { font-size:.8rem; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:26px 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px; }

  .breakdown { display:flex; flex-direction:column; gap:12px; }
  .bd-top { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:5px; }
  .bd-bar { background:var(--border); border-radius:6px; height:8px; overflow:hidden; }
  .bd-fill { height:100%; border-radius:6px; transition:width .5s; }

  .review { display:flex; flex-direction:column; gap:12px; max-height:380px; overflow-y:auto; padding-right:6px; }
  .rev { background:var(--bg); border:1px solid var(--border); border-left-width:4px; border-radius:10px; padding:14px; font-size:.88rem; }
  .rev.ok { border-left-color:var(--green); }
  .rev.ko { border-left-color:var(--red); }
  .rev.skip { border-left-color:var(--muted); }
  .rev-q { font-weight:600; margin-bottom:8px; line-height:1.4; }
  .rev-line { color:var(--muted); margin:3px 0; }
  .rev-line.ok-line { color:var(--green); }
  .rev-exp { margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); color:var(--text); line-height:1.5; }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">
        <span class="logo">🎓</span>
        <div>
          <h1>Révision Formation</h1>
          <p>DevOps · Docker · Spring Boot · Scrum · Git · Kubernetes · OIDC</p>
        </div>
      </div>
    </header>

    <!-- ÉCRAN D'ACCUEIL -->
    <section id="start" class="screen">
      <div class="stats-row">
        <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-lbl">Questions</span></div>
        <div class="stat"><span class="stat-num" id="statCat">0</span><span class="stat-lbl">Thèmes</span></div>
        <div class="stat"><span class="stat-num" id="statBest">—</span><span class="stat-lbl">Meilleur score</span></div>
      </div>

      <div class="field">
        <label for="selCat">Thème à réviser</label>
        <select id="selCat"></select>
      </div>

      <div class="field">
        <label>Nombre de questions</label>
        <div class="seg" id="segCount">
          <button data-v="10">10</button>
          <button data-v="20" class="active">20</button>
          <button data-v="all">Toutes</button>
        </div>
      </div>

      <div class="field">
        <label>Mode</label>
        <div class="seg" id="segMode">
          <button data-v="revision" class="active">Révision — correction immédiate</button>
          <button data-v="exam">Examen — correction à la fin</button>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="startBtn">Commencer la révision →</button>
      <p class="hint">Astuce : touches 1–4 pour répondre, Entrée pour continuer.</p>
    </section>

    <!-- ÉCRAN QUIZ -->
    <section id="quiz" class="screen" hidden>
      <div class="topbar">
        <span class="tag" id="category">—</span>
        <span class="counter" id="counter">1 / 20</span>
        <span class="score-pill" id="livescore">0 ✓</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress"></div></div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="navbar">
        <button class="btn btn-ghost" id="flagBtn">⚑ Marquer</button>
        <button class="btn btn-primary" id="next" disabled>Suivant →</button>
      </div>
    </section>

    <!-- ÉCRAN RÉSULTATS -->
    <section id="result" class="screen" hidden>
      <div class="result-head">
        <div class="ring" id="ring"><span class="ring-pct" id="finalPct">0%</span></div>
        <h2 id="resultTitle">Bilan</h2>
        <p id="resultMsg"></p>
        <p class="result-sub" id="resultSub"></p>
      </div>

      <h3 class="section-title">Score par thème</h3>
      <div id="breakdown" class="breakdown"></div>

      <h3 class="section-title">Correction détaillée</h3>
      <div id="review" class="review"></div>

      <div class="navbar navbar-center">
        <button class="btn btn-ghost" id="homeBtn">← Accueil</button>
        <button class="btn btn-primary" id="restartBtn">↺ Refaire</button>
      </div>
    </section>
  </div>

<script>
const questions = [
  {
    category: "Scrum",
    q: "Quelle est la durée recommandée d'un Sprint en Scrum ?",
    options: ["Entre 1 et 4 semaines", "Toujours exactement 2 mois", "1 journée", "6 mois minimum"],
    answer: 0,
    explain: "Un Sprint dure généralement entre 1 et 4 semaines, 2 semaines étant le choix le plus courant."
  },
  {
    category: "Scrum",
    q: "Qui est responsable de la priorisation du Product Backlog ?",
    options: ["Le Scrum Master", "L'équipe de développement", "Le Product Owner", "Le client final"],
    answer: 2,
    explain: "Le Product Owner gère et priorise le Product Backlog pour maximiser la valeur du produit."
  },
  {
    category: "Scrum",
    q: "Quel événement Scrum a lieu chaque jour ?",
    options: ["Sprint Review", "Daily Scrum (mêlée quotidienne)", "Sprint Planning", "Rétrospective"],
    answer: 1,
    explain: "Le Daily Scrum est une réunion de 15 minutes maximum, organisée chaque jour pour synchroniser l'équipe."
  },
  {
    category: "DevOps",
    q: "Que signifie l'acronyme CI/CD ?",
    options: ["Code Integration / Code Delivery", "Continuous Integration / Continuous Delivery (ou Deployment)", "Central Image / Central Database", "Cloud Infrastructure / Cloud Development"],
    answer: 1,
    explain: "CI/CD = Intégration Continue et Livraison/Déploiement Continu : automatiser build, tests et déploiement."
  },
  {
    category: "DevOps",
    q: "Quel est l'objectif principal de la culture DevOps ?",
    options: ["Remplacer les développeurs par des robots", "Rapprocher les équipes Dev et Ops pour livrer plus vite et plus sûrement", "Supprimer les tests", "Travailler uniquement en cascade (waterfall)"],
    answer: 1,
    explain: "DevOps vise à briser les silos entre développement et opérations pour des livraisons fréquentes et fiables."
  },
  {
    category: "DevOps",
    q: "Dans le fichier de ce cours, quel outil exécute le pipeline CI ?",
    options: ["Jenkins", "GitHub Actions (workflows .github/workflows)", "Travis CI", "CircleCI"],
    answer: 1,
    explain: "Le projet utilise GitHub Actions, défini dans .github/workflows/backend-ci.yml."
  },
  {
    category: "Docker",
    q: "Quelle commande construit une image à partir d'un Dockerfile ?",
    options: ["docker run", "docker build -t monimage .", "docker pull", "docker exec"],
    answer: 1,
    explain: "`docker build -t monimage .` construit une image en utilisant le Dockerfile du répertoire courant."
  },
  {
    category: "Docker",
    q: "À quoi sert un fichier docker-compose.yml ?",
    options: ["À écrire du code Java", "À définir et lancer plusieurs conteneurs (services) ensemble", "À compiler une application", "À gérer les branches Git"],
    answer: 1,
    explain: "docker-compose permet de décrire plusieurs services (ex: API, Keycloak, BDD) et de les démarrer avec `docker compose up`."
  },
  {
    category: "Docker",
    q: "Quelle est la différence entre une image et un conteneur Docker ?",
    options: ["Aucune, c'est synonyme", "L'image est le modèle (read-only), le conteneur est une instance exécutée de l'image", "L'image s'exécute, le conteneur est le fichier", "Le conteneur est plus lourd qu'une VM"],
    answer: 1,
    explain: "Une image est un gabarit immuable ; un conteneur est une instance vivante et isolée créée à partir de cette image."
  },
  {
    category: "Spring Boot",
    q: "Quelle annotation marque la classe principale d'une application Spring Boot ?",
    options: ["@Controller", "@SpringBootApplication", "@Entity", "@Bean"],
    answer: 1,
    explain: "@SpringBootApplication combine @Configuration, @EnableAutoConfiguration et @ComponentScan."
  },
  {
    category: "Spring Boot",
    q: "Quelle annotation expose une classe comme API REST renvoyant du JSON ?",
    options: ["@RestController", "@Repository", "@Service", "@Configuration"],
    answer: 0,
    explain: "@RestController = @Controller + @ResponseBody : les méthodes renvoient directement le corps de la réponse (JSON)."
  },
  {
    category: "Sécurité / OIDC",
    q: "Dans ce projet, quel outil sert de serveur d'identité (OIDC / SSO) ?",
    options: ["Keycloak", "MySQL", "Nginx", "RabbitMQ"],
    answer: 0,
    explain: "Keycloak est utilisé comme fournisseur OIDC ; l'API Spring Boot agit comme resource server qui valide les tokens."
  },
  {
    category: "Scrum",
    q: "Quels sont les trois rôles définis par Scrum ?",
    options: ["Chef de projet, Testeur, Architecte", "Product Owner, Scrum Master, Équipe de développement", "Manager, Client, Développeur", "Analyste, Designer, Ops"],
    answer: 1,
    explain: "Scrum définit 3 rôles : le Product Owner, le Scrum Master et l'équipe de développement (Developers)."
  },
  {
    category: "Scrum",
    q: "Quel est le rôle du Scrum Master ?",
    options: ["Donner les ordres à l'équipe", "Faciliter le processus, lever les obstacles et protéger l'équipe", "Écrire tout le code", "Fixer le budget du projet"],
    answer: 1,
    explain: "Le Scrum Master est un leader-serviteur : il facilite Scrum, coache l'équipe et élimine les obstacles (impediments)."
  },
  {
    category: "Scrum",
    q: "Qu'est-ce qu'un Sprint Backlog ?",
    options: ["La liste de tous les bugs du produit", "L'ensemble des éléments sélectionnés pour le Sprint + le plan pour les réaliser", "Le budget du Sprint", "La liste des congés de l'équipe"],
    answer: 1,
    explain: "Le Sprint Backlog contient les items du Product Backlog choisis pour le Sprint et la manière de les livrer."
  },
  {
    category: "Scrum",
    q: "Que produit l'équipe à la fin de chaque Sprint ?",
    options: ["Un rapport financier", "Un incrément de produit potentiellement livrable", "Un nouveau planning annuel", "Rien de concret"],
    answer: 1,
    explain: "Chaque Sprint doit aboutir à un incrément « Done », potentiellement livrable, qui apporte de la valeur."
  },
  {
    category: "Scrum",
    q: "À quoi sert la Rétrospective de Sprint ?",
    options: ["Présenter le produit au client", "Permettre à l'équipe de s'améliorer (process, collaboration, outils)", "Planifier le prochain Sprint", "Recruter de nouveaux membres"],
    answer: 1,
    explain: "La Rétrospective est un moment d'amélioration continue où l'équipe inspecte sa façon de travailler et l'ajuste."
  },
  {
    category: "DevOps",
    q: "Que désigne l'« Infrastructure as Code » (IaC) ?",
    options: ["Coder uniquement en assembleur", "Gérer et provisionner l'infrastructure via des fichiers de configuration versionnés", "Installer les serveurs à la main", "Écrire la documentation de l'infra"],
    answer: 1,
    explain: "L'IaC (Terraform, Ansible...) décrit l'infrastructure dans du code versionné, reproductible et automatisable."
  },
  {
    category: "DevOps",
    q: "Quel est l'intérêt principal du monitoring/observabilité en DevOps ?",
    options: ["Ralentir les déploiements", "Détecter les problèmes en production et comprendre le comportement du système", "Remplacer les tests unitaires", "Supprimer les logs"],
    answer: 1,
    explain: "Le monitoring (métriques, logs, traces) permet de détecter, diagnostiquer et anticiper les incidents en production."
  },
  {
    category: "DevOps",
    q: "Que signifie le terme « rollback » dans un déploiement ?",
    options: ["Lancer une nouvelle version", "Revenir à une version stable précédente en cas de problème", "Supprimer la base de données", "Redémarrer le serveur"],
    answer: 1,
    explain: "Un rollback consiste à restaurer la version précédente fonctionnelle lorsqu'un déploiement échoue ou pose problème."
  },
  {
    category: "DevOps",
    q: "Dans un workflow GitHub Actions, qu'est-ce qu'un « job » ?",
    options: ["Un commentaire dans le code", "Un ensemble d'étapes (steps) exécutées sur un runner", "Une branche Git", "Un fichier de configuration de la BDD"],
    answer: 1,
    explain: "Un job est une suite de steps exécutés sur une même machine (runner) ; un workflow peut contenir plusieurs jobs."
  },
  {
    category: "Git",
    q: "Quelle commande crée une nouvelle branche et bascule dessus ?",
    options: ["git branch -d", "git checkout -b ma-branche (ou git switch -c)", "git merge", "git clone"],
    answer: 1,
    explain: "`git checkout -b nom` (ou `git switch -c nom`) crée la branche et s'y positionne en une seule commande."
  },
  {
    category: "Git",
    q: "Que fait `git pull` ?",
    options: ["Envoie les commits locaux vers le dépôt distant", "Récupère et fusionne les changements distants dans la branche locale", "Supprime une branche", "Crée un nouveau dépôt"],
    answer: 1,
    explain: "`git pull` = `git fetch` (récupération) + `git merge` (fusion) des modifications du dépôt distant."
  },
  {
    category: "Git",
    q: "À quoi sert une Pull Request (PR) ?",
    options: ["À supprimer le dépôt", "À proposer et faire relire des changements avant de les fusionner", "À compiler le projet", "À lancer les conteneurs Docker"],
    answer: 1,
    explain: "Une Pull Request permet la revue de code et la discussion avant de fusionner une branche dans la branche principale."
  },
  {
    category: "Docker",
    q: "Quelle instruction du Dockerfile définit la commande lancée au démarrage du conteneur ?",
    options: ["FROM", "CMD (ou ENTRYPOINT)", "COPY", "WORKDIR"],
    answer: 1,
    explain: "CMD (ou ENTRYPOINT) définit le processus exécuté au démarrage ; FROM choisit l'image de base."
  },
  {
    category: "Docker",
    q: "À quoi sert un volume Docker ?",
    options: ["À augmenter le son", "À persister les données en dehors du cycle de vie du conteneur", "À compiler le code", "À limiter la mémoire"],
    answer: 1,
    explain: "Un volume permet de conserver les données (ex: base de données) même si le conteneur est recréé ou supprimé."
  },
  {
    category: "Docker",
    q: "Quelle commande liste les conteneurs en cours d'exécution ?",
    options: ["docker images", "docker ps", "docker rm", "docker logs"],
    answer: 1,
    explain: "`docker ps` liste les conteneurs actifs ; `docker ps -a` affiche aussi ceux arrêtés."
  },
  {
    category: "Spring Boot",
    q: "Quel mécanisme Spring permet d'injecter automatiquement les dépendances ?",
    options: ["L'héritage", "L'injection de dépendances (IoC / @Autowired)", "Le polymorphisme", "La sérialisation"],
    answer: 1,
    explain: "Spring repose sur l'Inversion de Contrôle : le conteneur injecte les beans (ex: via @Autowired ou le constructeur)."
  },
  {

/* ===================== Moteur de révision ===================== */
const LS_BEST = 'revFormationBest';
const $ = id => document.getElementById(id);
const letters = ['A', 'B', 'C', 'D', 'E'];

let session = [];   // questions de la session courante (avec état runtime)
let idx = 0;        // index de la question courante
let mode = 'revision';
let cfgCount = '20';
let cfgCat = 'all';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
function show(screen) {
  ['start', 'quiz', 'result'].forEach(s => $(s).hidden = (s !== screen));
}

/* ---------- Écran d'accueil ---------- */
const categories = [...new Set(questions.map(q => q.category))].sort();

function refreshBest() {
  const best = localStorage.getItem(LS_BEST);
  $('statBest').textContent = best ? best + '%' : '—';
}

function initStart() {
  $('statTotal').textContent = questions.length;
  $('statCat').textContent = categories.length;
  refreshBest();

  $('selCat').innerHTML = '<option value="all">Tous les thèmes</option>' +
    categories.map(c => `<option value="${c}">${c}</option>`).join('');
  $('selCat').onchange = e => cfgCat = e.target.value;

  $('segCount').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('segCount').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    cfgCount = b.dataset.v;
  });
  $('segMode').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('segMode').querySelectorAll('button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    mode = b.dataset.v;
  });

  $('startBtn').onclick = startSession;
}

/* ---------- Démarrage d'une session ---------- */
function startSession() {
  let pool = questions.filter(q => cfgCat === 'all' || q.category === cfgCat);
  shuffle(pool);
  if (cfgCount !== 'all') pool = pool.slice(0, Math.min(Number(cfgCount), pool.length));

  session = pool.map(q => {
    const correctText = q.options[q.answer];
    const opts = shuffle(q.options.map(text => ({ text, correct: text === correctText })));
    return { ...q, correctText, opts, chosen: null, flagged: false };
  });

  idx = 0;
  show('quiz');
  renderQuestion();
}

/* ---------- Affichage d'une question ---------- */
function renderQuestion() {
  const item = session[idx];
  const correctCount = session.filter(s => s.chosen === s.correctText).length;

  $('category').textContent = item.category;
  $('counter').textContent = `${idx + 1} / ${session.length}`;
  $('livescore').textContent = `${correctCount} ✓`;
  $('progress').style.width = `${(idx / session.length) * 100}%`;
  $('question').textContent = item.q;
  $('flagBtn').classList.toggle('active', item.flagged);

  $('feedback').className = 'feedback';
  $('feedback').textContent = '';

  const optsEl = $('options');
  optsEl.innerHTML = '';
  item.opts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="ltr">${letters[i]}</span><span>${o.text}</span>`;
    btn.dataset.correct = o.correct;
    btn.dataset.text = o.text;
    btn.onclick = () => choose(btn);
    optsEl.appendChild(btn);
  });

  // Restaurer l'état si la question a déjà été traitée (navigation)
  if (item.chosen !== null) {
    if (mode === 'revision') {
      applyAnswered(item, true);
    } else {
      const b = [...optsEl.children].find(x => x.dataset.text === item.chosen);
      if (b) b.classList.add('selected');
    }
  }

  const last = idx === session.length - 1;
  $('next').textContent = last ? 'Terminer ✓' : 'Suivant →';
  $('next').disabled = (mode === 'revision') ? item.chosen === null : false;
}

function choose(btn) {
  const item = session[idx];
  if (mode === 'revision' && item.chosen !== null) return; // verrouillé après réponse
  item.chosen = btn.dataset.text;

  if (mode === 'revision') {
    applyAnswered(item, true);
    $('next').disabled = false;
  } else {
    $('options').querySelectorAll('.option').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

function applyAnswered(item, withFeedback) {
  $('options').querySelectorAll('.option').forEach(b => {
    b.classList.add('disabled');
    if (b.dataset.correct === 'true') b.classList.add('correct');
    if (b.dataset.text === item.chosen && b.dataset.correct !== 'true') b.classList.add('wrong');
  });
  if (withFeedback) {
    const ok = item.chosen === item.correctText;
    const fb = $('feedback');
    fb.className = 'feedback show ' + (ok ? 'ok' : 'ko');
    fb.innerHTML = ok
      ? `✅ <strong>Correct.</strong> ${item.explain}`
      : `❌ <strong>Incorrect.</strong> Bonne réponse : « ${item.correctText} ». ${item.explain}`;
  }
}

/* ---------- Résultats ---------- */
function finish() {
  const total = session.length;
  const correct = session.filter(s => s.chosen === s.correctText).length;
  const pct = Math.round((correct / total) * 100);

  const best = Number(localStorage.getItem(LS_BEST) || 0);
  if (pct > best) localStorage.setItem(LS_BEST, pct);

  const color = pct >= 70 ? 'var(--green)' : pct >= 50 ? '#f59e0b' : 'var(--red)';
  $('ring').style.setProperty('--pct', pct);
  $('ring').style.setProperty('--ring-color', color);
  $('finalPct').textContent = pct + '%';
  $('resultTitle').textContent = `${correct} / ${total} bonnes réponses`;

  let msg;
  if (pct === 100) msg = 'Parfait, sujet maîtrisé 🏆';
  else if (pct >= 70) msg = 'Très bon niveau, prêt pour l\'examen 👏';
  else if (pct >= 50) msg = 'Des bases solides à consolider 📚';
  else msg = 'À retravailler — relis le cours et réessaie 💪';
  $('resultMsg').textContent = msg;

  const skipped = session.filter(s => s.chosen === null).length;
  $('resultSub').textContent = skipped
    ? `${skipped} question(s) sans réponse.`
    : 'Toutes les questions ont été traitées.';

  renderBreakdown();
  renderReview();
  show('result');
}

function renderBreakdown() {
  const map = {};
  session.forEach(s => {
    map[s.category] = map[s.category] || { ok: 0, n: 0 };
    map[s.category].n++;
    if (s.chosen === s.correctText) map[s.category].ok++;
  });
  const host = $('breakdown');
  host.innerHTML = '';
  Object.keys(map).sort().forEach(c => {
    const { ok, n } = map[c];
    const p = Math.round((ok / n) * 100);
    const color = p >= 70 ? 'var(--green)' : p >= 50 ? '#f59e0b' : 'var(--red)';
    const row = document.createElement('div');
    row.className = 'bd-row';
    row.innerHTML =
      `<div class="bd-top"><span>${c}</span><span>${ok}/${n} · ${p}%</span></div>
       <div class="bd-bar"><div class="bd-fill" style="width:${p}%;background:${color}"></div></div>`;
    host.appendChild(row);
  });
}

function renderReview() {
  const host = $('review');
  host.innerHTML = '';
  session.forEach((s, i) => {
    const ok = s.chosen === s.correctText;
    const cls = s.chosen === null ? 'skip' : ok ? 'ok' : 'ko';
    const yours = s.chosen === null ? '<em>Aucune réponse</em>' : s.chosen;
    const item = document.createElement('div');
    item.className = 'rev ' + cls;
    item.innerHTML =
      `<div class="rev-q">${s.flagged ? '⚑ ' : ''}${i + 1}. ${s.q}</div>
       <div class="rev-line"><span>${ok ? '✅' : '❌'}</span> Votre réponse : ${yours}</div>
       ${ok ? '' : `<div class="rev-line ok-line">✔ Bonne réponse : ${s.correctText}</div>`}
       <div class="rev-exp">${s.explain}</div>`;
    host.appendChild(item);
  });
}

/* ---------- Actions persistantes ---------- */
$('next').onclick = () => {
  if (idx < session.length - 1) { idx++; renderQuestion(); }
  else finish();
};
$('flagBtn').onclick = () => {
  const s = session[idx];
  s.flagged = !s.flagged;
  $('flagBtn').classList.toggle('active', s.flagged);
};
$('homeBtn').onclick = () => { refreshBest(); show('start'); };
$('restartBtn').onclick = startSession;

document.addEventListener('keydown', e => {
  if (!$('quiz').hidden) {
    if (['1', '2', '3', '4', '5'].includes(e.key)) {
      const b = $('options').children[Number(e.key) - 1];
      if (b && !b.classList.contains('disabled')) b.click();
    } else if (e.key === 'Enter' && !$('next').disabled) {
      $('next').click();
    }
  } else if (!$('start').hidden && e.key === 'Enter') {
    $('startBtn').click();
  }
});

/* ---------- Init ---------- */
initStart();
show('start');
</script>
