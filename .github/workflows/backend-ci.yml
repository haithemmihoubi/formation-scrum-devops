name: QuickBite Backend — CI

# Pipeline CI du backend Spring Boot (quickbite-api) :
#   build + tests à chaque push/PR, puis image Docker (smoke test) et publication GHCR.
#   Pas de déploiement automatique — l'image taguée est prête à être déployée.

on:
  push:
    branches: [main, develop]
    tags: ['v*']
    paths:
      - 'atelier-quickbite/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'atelier-quickbite/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quickbite-api
  CONTEXT_PATH: atelier-quickbite
  DOCKERFILE_PATH: atelier-quickbite/Dockerfile

jobs:
  # ──────────────────────────────────────────────
  #   JOB 1 : Build & tests (Maven)
  # ──────────────────────────────────────────────
  build-test:
    name: 🏗️ Build & tests  pour formation devops 
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: 🧪 Build & run tests
        run: mvn -B verify
        working-directory: ${{ env.CONTEXT_PATH }}

      - name: 📊 Publier les rapports de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: ${{ env.CONTEXT_PATH }}/target/surefire-reports/
          if-no-files-found: ignore

      - name: 📦 Archiver le jar
        uses: actions/upload-artifact@v4
        with:
          name: quickbite-api-jar
          path: ${{ env.CONTEXT_PATH }}/target/*.jar
          if-no-files-found: error

  # ──────────────────────────────────────────────
  #   JOB 2 : Image Docker + smoke test
  # ──────────────────────────────────────────────
  docker-build:
    name: 🐳 Build image + smoke test
    needs: build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build de l'image (sans push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.DOCKERFILE_PATH }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔥 Smoke test — démarrer l'API et vérifier /actuator/health
        run: |
          # Profil "dev" par défaut → base H2 en mémoire, aucune dépendance externe
          docker run -d -p 8080:8080 --name smoke-test ${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "⏳ Attente du démarrage de Spring Boot…"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Smoke test OK : /actuator/health a répondu HTTP 200"
              docker rm -f smoke-test
              exit 0
            fi
            sleep 2
          done

          echo "❌ Smoke test échoué : l'API n'a pas répondu HTTP 200 à temps"
          docker logs smoke-test
          docker rm -f smoke-test
          exit 1

  # ──────────────────────────────────────────────
  #   JOB 3 : Publier l'image sur GHCR
  # ──────────────────────────────────────────────
  push-image:
    name: 📤 Push image to GHCR
    needs: docker-build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extraire les métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
