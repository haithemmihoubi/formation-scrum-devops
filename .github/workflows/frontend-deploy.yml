name: QuickBite Frontend — CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'quickbite-frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'quickbite-frontend/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quickbite-frontend
  DOCKERFILE_PATH: quickbite-frontend/Dockerfile
  CONTEXT_PATH: quickbite-frontend

jobs:
  # ──────────────────────────────────────────────
  #   JOB 1 : Build & Test
  # ──────────────────────────────────────────────
  build:
    name: 🏗️ Build Angular + Docker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚡ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ env.CONTEXT_PATH }}/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci
        working-directory: ${{ env.CONTEXT_PATH }}

      - name: 🧪 Lint
        run: npx ng lint || echo "Aucune règle de lint configurée — skip"
        working-directory: ${{ env.CONTEXT_PATH }}
        continue-on-error: true

      - name: 🏗️ Build Angular (production)
        run: npm run build
        working-directory: ${{ env.CONTEXT_PATH }}

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Docker image (sans push)
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.DOCKERFILE_PATH }}
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🧪 Smoke test — démarrer le conteneur et vérifier HTTP 200
        run: |
          docker run -d -p 8080:80 --name smoke-test ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          docker logs smoke-test
          docker rm -f smoke-test
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed: HTTP $STATUS"

  # ──────────────────────────────────────────────
  #   JOB 2 : Push image to registry
  # ──────────────────────────────────────────────
  push-image:
    name: 📤 Push image to Registry
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extraire les métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🐳 Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.CONTEXT_PATH }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  #   JOB 3 : Deploy on server (SSH)
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy on server
    needs: push-image
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code (pour récupérer docker-compose si besoin)
        uses: actions/checkout@v4

      - name: 🚀 Déploiement via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e

            # Se connecter au registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull la dernière image
            docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest

            # Arrêter l'ancien conteneur
            docker rm -f quickbite-frontend 2>/dev/null || true

            # Lancer le nouveau conteneur
            docker run -d \
              --name quickbite-frontend \
              --restart unless-stopped \
              -p 80:80 \
              -p 443:443 \
              --label "traefik.enable=true" \
              ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.IMAGE_NAME }}:latest

            # Nettoyer les anciennes images
            docker image prune -af

            # Vérifier que le conteneur tourne
            sleep 3
            if [ "$(docker inspect -f '{{.State.Running}}' quickbite-frontend)" != "true" ]; then
              echo "❌ Le conteneur ne tourne pas !"
              docker logs quickbite-frontend
              exit 1
            fi
            echo "✅ Déploiement réussi !"
