ill='#dafbe1' stroke='#1a7f37' stroke-width='2' /><text x='148.0' y='110' font-size='15' fill='#1a7f37' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Synced</text><text x='148.0' y='132' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>cluster = Git</text><rect x='281.0' y='80' width='230' height='90' rx='12' fill='#fff1e5' stroke='#bc4c00' stroke-width='2' /><text x='396.0' y='110' font-size='15' fill='#bc4c00' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>OutOfSync</text><text x='396.0' y='132' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Git a changé</text><text x='396.0' y='149' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>(ou dérive manuelle)</text><rect x='529.0' y='80' width='230' height='90' rx='12' fill='#dafbe1' stroke='#1a7f37' stroke-width='2' /><text x='644.0' y='110' font-size='15' fill='#1a7f37' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Healthy</text><text x='644.0' y='132' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>ressources OK</text><rect x='777.0' y='80' width='230' height='90' rx='12' fill='#ffebe9' stroke='#cf222e' stroke-width='2' /><text x='892.0' y='110' font-size='15' fill='#cf222e' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Degraded</text><text x='892.0' y='132' font-size='10.5' fill='#1f2328' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>un Pod plante</text><text x='520.0' y='218' font-size='12' fill='#1f2328' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Scénario : quelqu'un modifie