='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>dérive annulée</text><text x='520.0' y='376' font-size='11' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Avec selfHeal activé, toute modification hors Git est automatiquement annulée : Git fait foi.</text></svg>