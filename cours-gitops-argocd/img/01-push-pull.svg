'bold' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>Push : le pipeline POUSSE dans le cluster</text><rect x='60' y='92' width='200' height='70' rx='10' fill='#f6f8fa' stroke='#24292e' stroke-width='2' /><text x='160' y='124' font-size='13' fill='#24292e' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Pipeline CI/CD</text><text x='160' y='144' font-size='10' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>(kubectl apply)</text><line x1='260' y1='127' x2='470' y2='127' stroke='#cf222e' stroke-width='3' marker-end='url(#arr-cf222e)' /><text x='365' y='112' font-size='10' fill='#cf222e' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>a les droits d'écriture</text><rect x='470' y='92' width='200' height='70' rx='10' fill='#e8f0fe' stroke='#326ce5' stroke-width='2' /><text x='570' y='124' font-size='13' fill='#326ce5' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Cluster K8s</text><text x='570' y='144' font-size='10' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>subit les ordres</text><text x='820' y='120' font-size='11' fill='#cf222e' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>✗ identifiants du cluster</text><text x='820' y='140' font-size='11' fill='#cf222e' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>  exposés au pipeline</text><line x1='60' y1='195' x2='1020' y2='195' stroke='#d0d7de' stroke-width='1.5' stroke-dasharray='6 5'/><text x='80' y='232' font-size='13' fill='#ef7b4d' font-weight='bold' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>Pull (GitOps) : un agent DANS le cluster tire depuis Git</text><rect x='60' y='250' width='190' height='80' rx='10' fill='#fde8e4' stroke='#f05133' stroke-width='2' /><text x='155' y='282' font-size='13' fill='#f05133' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Dépôt Git</text><text x='155' y='304' font-size='10' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>état désiré (YAML)</text><rect x='360' y='250' width='190' height='80' rx='10' fill='#fdeee6' stroke='#ef7b4d' stroke-width='2' /><text x='455' y='278' font-size='13' fill='#ef7b4d' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Argo CD</text><text x='455' y='300' font-size='10' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>(dans le cluster)</text><line x1='360' y1='290' x2='255' y2='290' stroke='#ef7b4d' stroke-width='3' marker-end='url(#arr-ef7b4d)' /><text x='307' y='274' font-size='9.5' fill='#ef7b4d' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>tire (pull)</text><rect x='660' y='250' width='190' height='80' rx='10' fill='#e8f0fe' stroke='#326ce5' stroke-width='2' /><text x='755' y='282' font-size='13' fill='#326ce5' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>Cluster K8s</text><text x='755' y='304' font-size='10' fill='#1a7f37' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>= reflet de Git</text><line x1='550' y1='290' x2='655' y2='290' stroke='#ef7b4d' stroke-width='3' marker-end='url(#arr-ef7b4d)' /><text x='602' y='274' font-size='9.5' fill='#ef7b4d' font-weight='bold' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>applique</text><text x='905' y='282' font-size='11' fill='#1a7f37' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>✓ aucun secret</text><text x='905' y='302' font-size='11' fill='#1a7f37' font-weight='normal' text-anchor='start' font-family='DejaVu Sans, Segoe UI, sans-serif'>  ne sort du cluster</text><text x='540.0' y='384' font-size='11' fill='#57606a' font-weight='normal' text-anchor='middle' font-family='DejaVu Sans, Segoe UI, sans-serif'>En GitOps, on ne pousse plus vers le cluster : on écrit dans Git, et l'agent réconcilie le cluster avec Git.</text></svg>