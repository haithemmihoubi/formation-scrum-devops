<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="DejaVu Sans, Arial, sans-serif"><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#F5B301"/></marker><marker id="ag" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#1E9E5A"/></marker></defs><text x="360" y="26" fill="#0B3D62" font-size="16" font-weight="bold" text-anchor="middle">Effet concret sur une équipe produit</text><rect x="40" y="44" width="280" height="38" rx="8" fill="#5B6770"/><text x="180.0" y="68.0" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Indicateur</text><rect x="324" y="44" width="178" height="38" rx="8" fill="#C0392B"/><text x="413.0" y="68.0" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Avant CI/CD</text><rect x="506" y="44" width="178" height="38" rx="8" fill="#1E9E5A"/><text x="595.0" y="68.0" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle">Avec CI/CD</text><rect x="40" y="86" width="280" height="38" fill="#F4F7FA" stroke="#d0d7de"/><text x="54" y="110" fill="#0B3D62" font-size="12" font-weight="bold" text-anchor="start">Fréquence de livraison</text><rect x="324" y="86" width="178" height="38" fill="#fdecea" stroke="#d0d7de"/><text x="413" y="110" fill="#7B241C" font-size="12" text-anchor="middle">1× / trimestre</text><rect x="506" y="86" width="178" height="38" fill="#e8f6ee" stroke="#d0d7de"/><text x="595" y="110" fill="#14633a" font-size="12" text-anchor="middle">10× / jour</text><rect x="40" y="128" width="280" height="38" fill="#F4F7FA" stroke="#d0d7de"/><text x="54" y="152" fill="#0B3D62" font-size="12" font-weight="bold" text-anchor="start">Délai commit → prod</text><rect x="324" y="128" width="178" height="38" fill="#fdecea" stroke="#d0d7de"/><text x="413" y="152" fill="#7B241C" font-size="12" text-anchor="middle">3 semaines</text><rect x="506" y="128" width="178" height="38" fill="#e8f6ee" stroke="#d0d7de"/><text x="595" y="152" fill="#14633a" font-size="12" text-anchor="middle">15 minutes</text><rect x="40" y="170" width="280" height="38" fill="#F4F7FA" stroke="#d0d7de"/><text x="54" y="194" fill="#0B3D62" font-size="12" font-weight="bold" text-anchor="start">Bugs détectés en prod</text><rect x="324" y="170" width="178" height="38" fill="#fdecea" stroke="#d0d7de"/><text x="413" y="194" fill="#7B241C" font-size="12" text-anchor="middle">fréquents</text><rect x="506" y="170" width="178" height="38" fill="#e8f6ee" stroke="#d0d7de"/><text x="595" y="194" fill="#14633a" font-size="12" text-anchor="middle">rares (bloqués en CI)</text><rect x="40" y="212" width="280" height="38" fill="#F4F7FA" stroke="#d0d7de"/><text x="54" y="236" fill="#0B3D62" font-size="12" font-weight="bold" text-anchor="start">Retour arrière (rollback)</text><rect x="324" y="212" width="178" height="38" fill="#fdecea" stroke="#d0d7de"/><text x="413" y="236" fill="#7B241C" font-size="12" text-anchor="middle">heures, manuel</text><rect x="506" y="212" width="178" height="38" fill="#e8f6ee" stroke="#d0d7de"/><text x="595" y="236" fill="#14633a" font-size="12" text-anchor="middle">1 clic, auto</text><rect x="40" y="254" width="280" height="38" fill="#F4F7FA" stroke="#d0d7de"/><text x="54" y="278" fill="#0B3D62" font-size="12" font-weight="bold" text-anchor="start">Stress des mises en prod</text><rect x="324" y="254" width="178" height="38" fill="#fdecea" stroke="#d0d7de"/><text x="413" y="278" fill="#7B241C" font-size="12" text-anchor="middle">élevé</text><rect x="506" y="254" width="178" height="38" fill="#e8f6ee" stroke="#d0d7de"/><text x="595" y="278" fill="#14633a" font-size="12" text-anchor="middle">routine</text></svg>