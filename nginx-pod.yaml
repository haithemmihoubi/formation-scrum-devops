apiVersion: v1
kind: Pod
metadata:
  name: nginx3
  labels:
    app: nginx3
spec:
  containers:
    - name: nginx3
      image: nginx:1.27
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"